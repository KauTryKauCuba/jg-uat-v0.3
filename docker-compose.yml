version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jg_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: jg_uat
    ports:
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jg_nextjs
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/jg_uat
      NEXTAUTH_SECRET: default_secret_for_uat_phase1_super_secret
      NEXTAUTH_URL: http://localhost:3100
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: jg_nginx
    restart: always
    ports:
      - "3100:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  pgdata:
