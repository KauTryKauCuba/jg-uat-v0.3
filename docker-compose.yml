version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jg_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-jg_uat}
    ports:
      - "127.0.0.1:5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jg_nextjs
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jg_uat}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://jg-uat.jejaku.my}
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: jg_nginx
    restart: always
    ports:
      - "3100:80"
      - "3443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web

volumes:
  pgdata:
  uploads:
