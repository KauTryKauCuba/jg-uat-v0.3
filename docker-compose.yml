services:
  postgres:
    image: postgres:16-alpine
    container_name: jg_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: jg_uat
    ports:
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jg_nextjs
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/jg_uat
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://jg-uat.jejaku.my
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: jg_nginx
    restart: always
    ports:
      - "3100:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  pgdata:
  uploads:
